<!DOCTYPE html>
<html>
    <head>
        <title>Onboarding - MindZone</title>
        <link rel="stylesheet" href="css/onboarding.css">
    </head>
    <body>
        <h1>MindZone</h1>
        <h2>Mental Strength</h2>

        <p>You have to train your mind to be good at your sport.</p>

        <div>
            <h3>Description of the App</h3>
            <p>MindZone helps young athletes build confidence, focus, and mental strength.</p>
        </div>

        <div>
            <h3>Create New Profile</h3>
            <form>
                <label>Name:</label>
                <input id="name" type="text" required>

                <br><br>

                <label>Age:</label>
                <input id="age" type="number" required>

                <br><br>

                <label>Sport:</label>
                <input id="sport" type="text" required>

                <br><br>

                <button id="submitBtn" type="submit">Continue</button>
            </form>
        </div>

        <script src="js/onboarding.js"></script>
    </body>
</html>
