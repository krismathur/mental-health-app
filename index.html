<!DOCTYPE html> <!-- Declares this document is HTML5. -->
<html> <!-- Starts the root HTML element for the page. -->
    <head> <!-- Starts the head section (metadata, title, links). -->
        <title>MindZone</title> <!-- Sets the browser tab title text. -->
        <link rel="stylesheet" href="style.css"> <!-- Loads the CSS file for styling. -->
    </head> <!-- Ends the head section. -->
    <body> <!-- Starts the visible page content (the body). -->
        <h1>MindZone</h1> <!-- Main page heading text. -->
        <h2>Mental Strength</h2> <!-- Secondary heading text. -->

        <p>You have to train your mind to be good at your sport</p> <!-- Intro sentence paragraph. -->


        <div> <!-- Starts a section container for the app description. -->
            <h3>Description of the App</h3> <!-- Section heading for the description. -->
            <p>MindZone helps young athletes build confidence, focus, and mental strnegth.</p> <!-- Description paragraph text. -->
        </div> <!-- Ends the app description section container. -->

        <div> <!-- Starts a section container for the profile form. -->
            <h3>Create New Profile</h3> <!-- Section heading for the form. -->
            <form> <!-- Starts a form for collecting user inputs. -->
                <label>Name:</label> <!-- Label text for the name input. -->
                <input type="text"> <!-- Text input where the user types their name. -->

                <br><br> <!-- Adds two line breaks for vertical spacing. -->

                <lable>Age:</lable> <!-- Label text for the age input (note: tag name is misspelled). -->
                <input type="number"> <!-- Number input where the user types their age. -->

                <br><br> <!-- Adds two line breaks for vertical spacing. -->

                <label>Sport:</label> <!-- Label text for the sport input. -->
                <input type="text"> <!-- Text input where the user types their sport. -->

                <br><br> <!-- Adds two line breaks for vertical spacing. -->

                <button type="submit">Get Started</button> <!-- Submit button that sends the form. -->
            </form> <!-- Ends the form. -->
        </div> <!-- Ends the profile form section container. -->

    </body> <!-- Ends the body section. -->
</html> <!-- Ends the root HTML element. -->
